<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BibliaDuo - Reina Valera 1960</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="top-bar">
        <div class="stat lives-stat"><span id="lives-display">❤️❤️❤️❤️❤️</span></div>
        <div class="stat xp-stat">⭐ <span id="xp-display">0</span> XP</div>
    </header>

    <main id="map-screen" class="screen active">
        <div class="map-header">
            <h1>Explora la Biblia</h1>
            <p>Desde Génesis hasta Apocalipsis</p>
        </div>
        <div id="levels-container" class="path-container">
            </div>
    </main>

    <main id="quiz-screen" class="screen">
        <div class="quiz-card">
            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>
            <h2 id="question-text">Pregunta</h2>
            <div id="options-container">
                </div>
            <p id="bible-ref" class="bible-reference"></p>
        </div>
        <div class="action-footer">
            <button id="check-btn" disabled>Comprobar</button>
        </div>
    </main>

    <main id="result-screen" class="screen result-card">
        <div class="result-content">
            <div class="icon-huge">🎉</div>
            <h1 id="result-title">¡Lección Completada!</h1>
            <p>Has ganado <span id="earned-xp" class="xp-text">0</span> XP.</p>
        </div>
        <div class="action-footer">
            <button id="continue-btn">Continuar el viaje</button>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
